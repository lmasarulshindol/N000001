<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD プロンプト管理ツール</title>
<style>
  :root {
    --bg: #14151a;
    --panel: #1d1f27;
    --panel2: #262934;
    --line: #343845;
    --txt: #e8eaf0;
    --sub: #9aa0b0;
    --accent: #ff5a8a;
    --accent2: #6c8cff;
    --on: #ff5a8a;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Meiryo", system-ui, sans-serif;
    background: var(--bg);
    color: var(--txt);
    font-size: 14px;
  }
  header {
    position: sticky; top: 0; z-index: 30;
    background: linear-gradient(180deg, #1d1f27 0%, #1a1c23 100%);
    border-bottom: 1px solid var(--line);
    padding: 12px 18px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
  }
  header h1 { font-size: 17px; margin: 0; letter-spacing: .5px; }
  header .spacer { flex: 1; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .search {
    background: var(--panel2); border: 1px solid var(--line); color: var(--txt);
    padding: 7px 12px; border-radius: 20px; outline: none; width: 200px;
  }
  .search:focus { border-color: var(--accent2); }
  button {
    background: var(--panel2); border: 1px solid var(--line); color: var(--txt);
    padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
    transition: .12s;
  }
  button:hover { border-color: var(--accent2); background: #2f3340; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button.primary:hover { background: #ff7099; }
  button.warn:hover { border-color: #ff6b6b; color: #ff9a9a; }

  .layout { display: flex; align-items: flex-start; gap: 16px; padding: 16px; }
  .main { flex: 1; min-width: 0; }
  .side {
    width: 360px; flex-shrink: 0; position: sticky; top: 70px;
  }

  .cat {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); margin-bottom: 14px; overflow: hidden;
  }
  .cat-head {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; cursor: pointer; user-select: none;
    background: var(--panel2);
  }
  .cat-head:hover { background: #2c3040; }
  .cat-head .ttl { font-weight: 600; font-size: 14px; }
  .cat-head .cnt { font-size: 12px; color: var(--sub); }
  .cat-head .badge {
    margin-left: auto; background: var(--accent); color: #fff;
    border-radius: 12px; padding: 1px 9px; font-size: 11px; font-weight: 700;
    min-width: 20px; text-align: center; display: none;
  }
  .cat-head .badge.show { display: inline-block; }
  .cat-head .arrow { color: var(--sub); transition: .15s; }
  .cat.collapsed .arrow { transform: rotate(-90deg); }
  .cat.collapsed .tags { display: none; }
  .tags { display: flex; flex-wrap: wrap; gap: 7px; padding: 13px; }
  .tag {
    border: 1px solid var(--line); background: var(--panel2);
    border-radius: 8px; padding: 6px 11px; cursor: pointer; user-select: none;
    display: flex; flex-direction: column; line-height: 1.25; transition: .1s;
  }
  .tag:hover { border-color: var(--accent2); }
  .tag.on {
    background: rgba(255,90,138,.16); border-color: var(--accent);
  }
  .tag .ja { font-size: 13px; }
  .tag .en { font-size: 11px; color: var(--sub); }
  .tag.on .en { color: var(--accent); }

  .side-card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 14px; margin-bottom: 14px;
  }
  .side-card h2 {
    font-size: 13px; margin: 0 0 10px; color: var(--sub);
    text-transform: uppercase; letter-spacing: 1px;
  }
  textarea {
    width: 100%; background: #0f1014; border: 1px solid var(--line);
    color: var(--txt); border-radius: 8px; padding: 10px; resize: vertical;
    font-family: "Consolas", monospace; font-size: 12.5px; line-height: 1.5;
    outline: none;
  }
  textarea:focus { border-color: var(--accent2); }
  .out-actions { display: flex; gap: 8px; margin-top: 9px; }
  .out-actions button { flex: 1; }
  .meta { font-size: 11px; color: var(--sub); margin-top: 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; min-height: 8px; }
  .chip {
    background: rgba(108,140,255,.15); border: 1px solid #3a4256;
    color: #b9c4ff; border-radius: 14px; padding: 3px 9px; font-size: 11px;
    cursor: pointer; display: flex; gap: 5px; align-items: center;
  }
  .chip:hover { border-color: #ff6b6b; color: #ffb3b3; }
  .chip .x { opacity: .6; }
  .custom-row { display: flex; gap: 6px; margin-top: 8px; }
  .custom-row input {
    flex: 1; background: #0f1014; border: 1px solid var(--line); color: var(--txt);
    padding: 7px 10px; border-radius: 8px; outline: none;
  }
  .custom-row input:focus { border-color: var(--accent2); }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: #fff; padding: 11px 22px; border-radius: 24px;
    font-weight: 600; opacity: 0; pointer-events: none; transition: .25s; z-index: 99;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .neg textarea { border-color: #5a3a3a; }
  .row2 { display: flex; gap: 8px; }
  .row2 > div { flex: 1; }
  label.lblsmall { font-size: 11px; color: var(--sub); display:block; margin-bottom:4px; }
  .hidden { display: none !important; }
  footer { text-align: center; color: var(--sub); font-size: 11px; padding: 20px; }
  @media (max-width: 900px) {
    .layout { flex-direction: column; }
    .side { width: 100%; position: static; }
  }
</style>
</head>

// 標準ネガティブプリセット
const NEG_PRESET = "lowres, bad anatomy, bad hands, missing fingers, extra digit, fewer digits, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry, deformed, mutated, bad proportions, extra limbs, malformed";

// ====== 状態 ======
const STORE_KEY = "sd_prompt_tool_v1";
let selected = []; // {ja, en}
let openState = {}; // catName -> bool(collapsed)

function loadState(){
  try {
    const s = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
    selected = s.selected || [];
    openState = s.open || {};
    if (s.negative !== undefined) document.getElementById("negative").value = s.negative;
    if (s.sep) document.getElementById("sep").value = s.sep;
    if (s.lang) document.getElementById("lang").value = s.lang;
  } catch(e){}
}
function saveState(){
  localStorage.setItem(STORE_KEY, JSON.stringify({
    selected, open: openState,
    negative: document.getElementById("negative").value,
    sep: document.getElementById("sep").value,
    lang: document.getElementById("lang").value,
  }));
}

// ====== 描画 ======
const container = document.getElementById("catContainer");
function buildCats(){
  container.innerHTML = "";
  DATA.forEach(cat => {
    const collapsed = openState[cat.name] === true;
    const div = document.createElement("div");
    div.className = "cat" + (collapsed ? " collapsed" : "");
    div.dataset.cat = cat.name;

    const head = document.createElement("div");
    head.className = "cat-head";
    head.innerHTML = `<span class="arrow">▼</span>
      <span class="ttl">${cat.name}</span>
      <span class="cnt">(${cat.items.length})</span>
      <span class="badge"></span>`;
    head.addEventListener("click", () => {
      div.classList.toggle("collapsed");
      openState[cat.name] = div.classList.contains("collapsed");
      saveState();
    });

    const tags = document.createElement("div");
    tags.className = "tags";
    cat.items.forEach(([ja, en]) => {
      const t = document.createElement("div");
      const isOn = selected.some(s => s.en === en);
      t.className = "tag" + (isOn ? " on" : "");
      t.dataset.ja = ja; t.dataset.en = en;
      t.innerHTML = `<span class="ja">${ja}</span><span class="en">${en}</span>`;
      t.addEventListener("click", () => toggleTag(ja, en, t));
      tags.appendChild(t);
    });

    div.appendChild(head);
    div.appendChild(tags);
    container.appendChild(div);
  });
  updateBadges();
}

function toggleTag(ja, en, el){
  const idx = selected.findIndex(s => s.en === en);
  if (idx >= 0){ selected.splice(idx,1); el && el.classList.remove("on"); }
  else { selected.push({ja,en}); el && el.classList.add("on"); }
  refresh();
}

function updateBadges(){
  document.querySelectorAll(".cat").forEach(div => {
    const cat = DATA.find(c => c.name === div.dataset.cat);
    const n = cat.items.filter(([ja,en]) => selected.some(s => s.en === en)).length;
    const badge = div.querySelector(".badge");
    badge.textContent = n;
    badge.classList.toggle("show", n > 0);
  });
}

function buildOutput(){
  const sepRaw = document.getElementById("sep").value;
  const sep = sepRaw === "\\n" ? "\n" : sepRaw;
  const lang = document.getElementById("lang").value;
  return selected.map(s => lang === "enja" ? `${s.en} /*${s.ja}*/` : s.en).join(sep);
}

function refresh(){
  document.getElementById("output").value = buildOutput();
  document.getElementById("selCount").textContent = selected.length;
  document.getElementById("charCount").textContent = document.getElementById("output").value.length;
  // chips
  const chips = document.getElementById("chips");
  chips.innerHTML = "";
  selected.forEach(s => {
    const c = document.createElement("span");
    c.className = "chip";
    c.innerHTML = `${s.ja}<span class="x">✕</span>`;
    c.title = s.en;
    c.addEventListener("click", () => {
      const idx = selected.findIndex(x => x.en === s.en);
      if (idx>=0) selected.splice(idx,1);
      const tag = document.querySelector(`.tag[data-en="${CSS.escape(s.en)}"]`);
      tag && tag.classList.remove("on");
      refresh();
    });
    chips.appendChild(c);
  });
  updateBadges();
  saveState();
}

// ====== 検索 ======
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll(".cat").forEach(div => {
    let visibleCount = 0;
    div.querySelectorAll(".tag").forEach(t => {
      const hit = !q || t.dataset.ja.toLowerCase().includes(q) || t.dataset.en.toLowerCase().includes(q);
      t.classList.toggle("hidden", !hit);
      if (hit) visibleCount++;
    });
    div.classList.toggle("hidden", visibleCount === 0);
    if (q) div.classList.remove("collapsed");
  });
});

// ====== ボタン ======
document.getElementById("copyBtn").addEventListener("click", () => {

});
document.getElementById("copyNegBtn").addEventListener("click", () => {
  copyText(document.getElementById("negative").value, "ネガティブをコピーしました！");
});
document.getElementById("negPreset").addEventListener("click", () => {
  document.getElementById("negative").value = NEG_PRESET;
  saveState();
});
document.getElementById("clearAll").addEventListener("click", () => {
  if (!confirm("全ての選択を解除しますか？")) return;
  selected = [];
  document.querySelectorAll(".tag.on").forEach(t => t.classList.remove("on"));
  refresh();
});
document.getElementById("expandAll").addEventListener("click", () => {
  document.querySelectorAll(".cat").forEach(d => { d.classList.remove("collapsed"); openState[d.dataset.cat]=false; });
  saveState();
});
document.getElementById("collapseAll").addEventListener("click", () => {
  document.querySelectorAll(".cat").forEach(d => { d.classList.add("collapsed"); openState[d.dataset.cat]=true; });
  saveState();
});
document.getElementById("addCustom").addEventListener("click", addCustomTag);
document.getElementById("customInput").addEventListener("keydown", e => { if(e.key==="Enter") addCustomTag(); });
document.getElementById("sep").addEventListener("change", refresh);
document.getElementById("lang").addEventListener("change", refresh);
document.getElementById("negative").addEventListener("input", saveState);

function addCustomTag(){
  const inp = document.getElementById("customInput");
  const v = inp.value.trim();
  if (!v) return;
  if (selected.some(s => s.en === v)) { showToast("既に追加済みです"); inp.value=""; return; }
  selected.push({ja: v, en: v});
  inp.value = "";
  refresh();
}

function copyText(text, msg){
  if (!text){ showToast("コピーする内容がありません"); return; }
  navigator.clipboard.writeText(text).then(() => showToast(msg)).catch(() => {
    const ta = document.getElementById("output");
    ta.select(); document.execCommand("copy"); showToast(msg);
  });
}

let toastTimer;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1600);
